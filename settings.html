<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Lab Scheduler</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .time-window {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .time-window label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time-block-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .time-block-row input[type="time"] {
      width: auto;
      max-width: 130px;
    }

    .block-arrow {
      color: var(--overlay0);
    }

    .remove-block-btn {
      background: transparent;
      color: var(--overlay0);
      border: none;
      padding: 2px 6px;
      font-size: 16px;
      line-height: 1;
      border-radius: 3px;
      cursor: pointer;
    }

    .remove-block-btn:hover {
      color: var(--red);
      background: rgba(243, 139, 168, 0.15);
    }

    #addBlockBtn {
      margin-bottom: 20px;
    }

    .date-picker-wrapper {
      display: inline-flex;
      align-items: center;
      background: var(--surface0);
      border: 1px solid var(--surface1);
      border-radius: 4px;
      vertical-align: middle;
    }

    .date-picker-wrapper:focus-within {
      border-color: var(--mauve);
      box-shadow: 0 0 0 2px rgba(203, 166, 247, 0.2);
    }

    .date-day-prefix {
      padding: 10px 4px 10px 10px;
      color: var(--mauve);
      font-weight: 600;
      font-size: 14px;
      pointer-events: none;
      user-select: none;
      min-width: 36px;
    }

    .date-picker-wrapper input[type="text"] {
      border: none !important;
      background: transparent !important;
      padding: 10px 10px 10px 4px !important;
      width: 82px !important;
      max-width: 82px !important;
      box-shadow: none !important;
    }

    .presenter-section {
      margin-bottom: 25px;
    }

    .person-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--surface1);
      border-radius: 4px;
      margin-bottom: 6px;
      background: var(--surface0);
    }

    .drag-handle {
      color: var(--overlay0);
      font-weight: bold;
      user-select: none;
      cursor: grab;
      flex-shrink: 0;
      padding: 0 2px;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .person-name {
      flex: 1;
      min-width: 0;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .person-duration {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .person-duration input {
      width: 48px !important;
      max-width: 48px;
      padding: 4px 6px !important;
      font-size: 13px;
    }

    .duration-label {
      font-size: 12px;
      color: var(--overlay0);
    }

    .person-delete {
      flex-shrink: 0;
      background: transparent;
      color: var(--overlay0);
      border: none;
      padding: 2px 6px;
      font-size: 14px;
      line-height: 1;
      border-radius: 3px;
      cursor: pointer;
    }

    .person-delete:hover {
      color: var(--red);
      background: rgba(243, 139, 168, 0.15);
    }

    .person-list {
      list-style: none;
      padding: 0;
      margin: 15px 0;
    }

    .add-person {
      display: flex;
      gap: 10px;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    .add-person input {
      flex: 1;
      min-width: 150px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .section-divider {
      margin: 30px 0 20px 0;
      padding-top: 20px;
      border-top: 2px solid var(--surface0);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Lab Scheduler</h1>
      <a href="index.html">View Schedule</a>
    </header>

    <!-- Time window -->
    <h2>Time Window</h2>
    <div class="time-window">
      <label>Date: <span class="date-picker-wrapper"><span id="dateDayLabel" class="date-day-prefix"></span><input type="text" id="scheduleDate" placeholder="dd/mm/yy"></span></label>
    </div>
    <div id="timeBlocksList"></div>
    <button type="button" id="addBlockBtn" class="secondary" onclick="addTimeBlock()">+ Add block</button>

    <!-- Presenter reminder -->
    <div class="presenter-section">
      <h2>This Week's Presenter</h2>
      <p style="font-size: 13px; color: #666; margin: 0 0 10px 0;">Optional reminder if presenter is checked in.</p>
      <input type="text" id="presenter" placeholder="e.g. John Doe" style="max-width: 250px;">
      <div id="presenterWarning"></div>
    </div>

    <!-- Generate button -->
    <div id="generateError"></div>
    <button onclick="doGenerate()">Generate Schedule</button>

    <!-- Lab members -->
    <div class="section-divider">
      <h2 style="margin-top: 0;">Lab Members</h2>
      <p style="font-size: 13px; color: #666; margin-top: 0;">Drag to move between columns. Each person can have a custom slot duration.</p>

      <div class="add-person">
        <input type="text" id="newPersonInput" placeholder="Enter name...">
        <button onclick="addNewPerson()">Add</button>
      </div>

      <div class="two-col-people">
        <div class="people-col">
          <h3>Excluded</h3>
          <ul id="excludedList" class="person-list"></ul>
        </div>
        <div class="people-col">
          <h3>Included</h3>
          <ul id="includedList" class="person-list"></ul>
        </div>
      </div>

      <div class="button-group">
        <button class="secondary" onclick="resetAllDurationsHandler()">Reset all to 20 min</button>
      </div>

      <p style="font-size: 12px; color: #999;">All changes save automatically.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="app.js"></script>
  <script>
    let includedSortable = null;
    let excludedSortable = null;

    function buildPersonRow(person) {
      const li = document.createElement('li');
      li.className = 'person-row';
      li.dataset.id = person.id;

      const duration = person.duration || 20;

      li.innerHTML = `
        <span class="drag-handle">≡</span>
        <span class="person-name">${escapeHtml(person.name)}</span>
        <div class="person-duration">
          <input type="number" class="person-duration-input" data-id="${person.id}" value="${duration}" min="5" max="120">
          <span class="duration-label">min</span>
        </div>
        <button class="person-delete" onclick="deletePersonHandler('${person.id}')" title="Remove">✕</button>
      `;

      return li;
    }

    function renderPeopleRows() {
      if (includedSortable) { includedSortable.destroy(); includedSortable = null; }
      if (excludedSortable) { excludedSortable.destroy(); excludedSortable = null; }

      const people = getPeople();
      const includedList = document.getElementById('includedList');
      const excludedList = document.getElementById('excludedList');

      includedList.innerHTML = '';
      excludedList.innerHTML = '';

      const seen = new Set();
      const deduped = [];
      people.forEach(person => {
        if (seen.has(person.id)) return;
        seen.add(person.id);
        deduped.push(person);
        const row = buildPersonRow(person);
        if (person.included === false) {
          excludedList.appendChild(row);
        } else {
          includedList.appendChild(row);
        }
      });
      if (deduped.length !== people.length) {
        savePeople(deduped);
      }

      const sortableOpts = {
        group: 'people',
        handle: '.drag-handle',
        animation: 150,
        onEnd: syncFromDOM
      };

      includedSortable = Sortable.create(includedList, sortableOpts);
      excludedSortable = Sortable.create(excludedList, sortableOpts);

      document.querySelectorAll('.person-duration-input').forEach(input => {
        input.addEventListener('change', (e) => {
          const id = e.target.dataset.id;
          const minutes = parseInt(e.target.value, 10) || 20;
          setPersonDuration(id, minutes);
        });
      });

      updatePresenterWarning();
    }

    function syncFromDOM() {
      const people = getPeople();
      const byId = new Map(people.map(p => [p.id, p]));
      const newOrder = [];

      document.querySelectorAll('#excludedList > .person-row').forEach(li => {
        const p = byId.get(li.dataset.id);
        if (p) newOrder.push({ ...p, included: false });
      });

      document.querySelectorAll('#includedList > .person-row').forEach(li => {
        const p = byId.get(li.dataset.id);
        if (p) newOrder.push({ ...p, included: true });
      });

      savePeople(newOrder);
      updatePresenterWarning();
    }

    function updatePresenterWarning() {
      const presenter = document.getElementById('presenter').value.trim();
      const warningDiv = document.getElementById('presenterWarning');

      if (!presenter) {
        warningDiv.innerHTML = '';
        return;
      }

      const people = getPeople();
      const match = people.find(p => p.name.toLowerCase() === presenter.toLowerCase());

      if (match && match.included !== false) {
        warningDiv.innerHTML = `<div class="warning-banner" style="margin-top: 10px;">⚠ <strong>${escapeHtml(presenter)}</strong> is in the Included column — remember to exclude them!</div>`;
      } else {
        warningDiv.innerHTML = '';
      }
    }

    function parseDdMmYy(str) {
      const parts = str.trim().split('/');
      if (parts.length !== 3) return null;
      const [dd, mm, yy] = parts.map(Number);
      if (!dd || !mm || !yy) return null;
      const d = new Date(2000 + yy, mm - 1, dd, 12, 0, 0);
      if (isNaN(d.getTime()) || d.getMonth() !== mm - 1) return null;
      return d;
    }

    function renderTimeBlocks(blocks) {
      const list = document.getElementById('timeBlocksList');
      list.innerHTML = '';
      blocks.forEach((block, i) => {
        const row = document.createElement('div');
        row.className = 'time-block-row';
        row.innerHTML = `
          <input type="time" class="block-start" value="${block.start}">
          <span class="block-arrow">→</span>
          <input type="time" class="block-end" value="${block.end}">
          <button type="button" class="remove-block-btn" onclick="removeTimeBlock(${i})" ${blocks.length === 1 ? 'style="visibility:hidden"' : ''}>×</button>
        `;
        list.appendChild(row);
      });
    }

    function getTimeBlocks() {
      return Array.from(document.querySelectorAll('#timeBlocksList .time-block-row')).map(row => ({
        start: row.querySelector('.block-start').value,
        end: row.querySelector('.block-end').value
      }));
    }

    function addTimeBlock() {
      const blocks = getTimeBlocks();
      const last = blocks[blocks.length - 1];
      const [h, m] = last.end.split(':').map(Number);
      const newStartMin = h * 60 + m;
      const newEndMin = Math.min(newStartMin + 60, 23 * 60 + 59);
      blocks.push({ start: minToTime(newStartMin), end: minToTime(newEndMin) });
      renderTimeBlocks(blocks);
    }

    function removeTimeBlock(index) {
      const blocks = getTimeBlocks();
      if (blocks.length <= 1) return;
      blocks.splice(index, 1);
      renderTimeBlocks(blocks);
    }

    function doGenerate() {
      const timeBlocks = getTimeBlocks();
      const dateParsed = parseDdMmYy(document.getElementById('scheduleDate').value);
      const dateStr = dateParsed
        ? `${dateParsed.getFullYear()}-${String(dateParsed.getMonth() + 1).padStart(2, '0')}-${String(dateParsed.getDate()).padStart(2, '0')}`
        : null;
      const activePeople = getActivePeople();

      const result = generateSchedule(timeBlocks, activePeople, dateStr);
      const errorDiv = document.getElementById('generateError');

      if (result.error) {
        errorDiv.innerHTML = `<div class="error">${result.error}</div>`;
        return;
      }

      errorDiv.innerHTML = '';
      localStorage.setItem(STORAGE_LAST_SCHEDULE, JSON.stringify(result));
      window.location.href = 'index.html';
    }

    function addNewPerson() {
      const input = document.getElementById('newPersonInput');
      const name = input.value.trim();
      if (!name) return;
      addPerson(name);
      input.value = '';
      renderPeopleRows();
    }

    function deletePersonHandler(id) {
      if (confirm('Delete this person?')) {
        removePerson(id);
        renderPeopleRows();
      }
    }

    function resetAllDurationsHandler() {
      if (confirm('Reset all durations to 20 minutes?')) {
        resetAllDurations();
        renderPeopleRows();
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('presenter').addEventListener('input', (e) => {
      setPresenter(e.target.value);
      updatePresenterWarning();
    });

    document.getElementById('newPersonInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addNewPerson();
    });

    function nextWednesday() {
      const d = new Date();
      const daysUntil = (3 - d.getDay() + 7) % 7 || 7;
      d.setDate(d.getDate() + daysUntil);
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yy = String(d.getFullYear()).slice(2);
      return `${dd}/${mm}/${yy}`;
    }

    function updateDateDay() {
      const d = parseDdMmYy(document.getElementById('scheduleDate').value);
      document.getElementById('dateDayLabel').textContent = d
        ? d.toLocaleDateString('en-US', { weekday: 'short' })
        : '';
    }

    document.getElementById('scheduleDate').addEventListener('input', updateDateDay);

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('scheduleDate').value = nextWednesday();
      updateDateDay();
      document.getElementById('presenter').value = getPresenter();
      renderTimeBlocks([{ start: '09:00', end: '12:00' }]);
      renderPeopleRows();
    });
  </script>
</body>
</html>
