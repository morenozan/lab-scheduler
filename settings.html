<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Lab Scheduler</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .time-window {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .time-window label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time-window input[type="time"] {
      width: auto;
      max-width: 150px;
    }

    .presenter-section {
      margin-bottom: 25px;
    }

    .person-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid #eee;
      border-radius: 4px;
      margin-bottom: 8px;
      background: #fafafa;
      cursor: grab;
    }

    .person-row:active {
      cursor: grabbing;
      background: #f0f0f0;
    }

    .drag-handle {
      color: #999;
      font-weight: bold;
      user-select: none;
      min-width: 20px;
      text-align: center;
    }

    .person-checkbox {
      flex-shrink: 0;
    }

    .person-name {
      flex: 1;
      min-width: 120px;
      font-weight: 500;
    }

    .person-duration {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .person-duration input {
      width: 50px !important;
      max-width: 50px;
      padding: 6px !important;
    }

    .person-delete {
      flex-shrink: 0;
    }

    .person-list {
      list-style: none;
      padding: 0;
      margin: 15px 0;
    }

    .add-person {
      display: flex;
      gap: 10px;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    .add-person input {
      flex: 1;
      min-width: 150px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .section-divider {
      margin: 30px 0 20px 0;
      padding-top: 20px;
      border-top: 2px solid #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Lab Scheduler</h1>
      <a href="index.html">View Schedule</a>
    </header>

    <!-- Time window -->
    <h2>Time Window</h2>
    <div class="time-window">
      <label>Start: <input type="time" id="startTime" value="10:00"></label>
      <label>End: <input type="time" id="endTime" value="11:00"></label>
    </div>

    <!-- Presenter reminder -->
    <div class="presenter-section">
      <h2>This Week's Presenter</h2>
      <p style="font-size: 13px; color: #666; margin: 0 0 10px 0;">Optional reminder if presenter is checked in.</p>
      <input type="text" id="presenter" placeholder="e.g. John Doe" style="max-width: 250px;">
      <div id="presenterWarning"></div>
    </div>

    <!-- Generate button -->
    <div id="generateError"></div>
    <button onclick="doGenerate()">Generate Schedule</button>

    <!-- Lab members -->
    <div class="section-divider">
      <h2 style="margin-top: 0;">Lab Members</h2>
      <p style="font-size: 13px; color: #666; margin-top: 0;">Drag to reorder. Each person can have a custom slot duration.</p>

      <div class="add-person">
        <input type="text" id="newPersonInput" placeholder="Enter name...">
        <button onclick="addNewPerson()">Add</button>
      </div>

      <div id="peopleContainer"></div>

      <div class="button-group">
        <button class="secondary" onclick="resetAllDurations()">Reset all to 20 min</button>
      </div>

      <p style="font-size: 12px; color: #999;">All changes save automatically.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="app.js"></script>
  <script>
    let sortableInstance = null;

    function renderPeopleRows() {
      const people = getPeople();
      const container = document.getElementById('peopleContainer');

      if (people.length === 0) {
        container.innerHTML = '<p style="color: #999;">No members yet. Add one above.</p>';
        if (sortableInstance) {
          sortableInstance.destroy();
          sortableInstance = null;
        }
        return;
      }

      const list = document.createElement('ul');
      list.className = 'person-list';
      list.id = 'sortable-list';

      people.forEach(person => {
        const li = document.createElement('li');
        li.className = 'person-row';
        li.dataset.id = person.id;

        const duration = person.duration || 20;

        li.innerHTML = `
          <span class="drag-handle">≡</span>
          <input type="checkbox" class="person-checkbox person-check" data-id="${person.id}" checked>
          <span class="person-name">${escapeHtml(person.name)}</span>
          <div class="person-duration">
            <input type="number" class="person-duration-input" data-id="${person.id}" value="${duration}" min="5" max="120">
            <span>min</span>
          </div>
          <button class="danger person-delete" onclick="deletePersonHandler('${person.id}')">✕</button>
        `;

        list.appendChild(li);
      });

      container.innerHTML = '';
      container.appendChild(list);

      if (sortableInstance) {
        sortableInstance.destroy();
      }

      sortableInstance = Sortable.create(list, {
        handle: '.drag-handle',
        animation: 150,
        onEnd: () => {
          const newOrder = Array.from(list.querySelectorAll('[data-id]')).map(li => {
            const id = li.dataset.id;
            return people.find(p => p.id === id);
          });
          reorderPeople(newOrder);
        }
      });

      // Attach event listeners
      document.querySelectorAll('.person-check').forEach(cb => {
        cb.addEventListener('change', updatePresenterWarning);
      });

      document.querySelectorAll('.person-duration-input').forEach(input => {
        input.addEventListener('change', (e) => {
          const id = e.target.dataset.id;
          const minutes = parseInt(e.target.value, 10) || 20;
          setPersonDuration(id, minutes);
        });
      });

      updatePresenterWarning();
    }

    function updatePresenterWarning() {
      const presenter = document.getElementById('presenter').value.trim();
      const warningDiv = document.getElementById('presenterWarning');

      if (!presenter) {
        warningDiv.innerHTML = '';
        return;
      }

      const people = getPeople();
      const match = people.find(p => p.name.toLowerCase() === presenter.toLowerCase());

      if (!match) {
        warningDiv.innerHTML = '';
        return;
      }

      const checkbox = document.querySelector(`.person-check[data-id="${match.id}"]`);
      if (checkbox && checkbox.checked) {
        warningDiv.innerHTML = `<div class="warning-banner" style="margin-top: 10px;">⚠ <strong>${escapeHtml(presenter)}</strong> is checked in — remember to exclude them!</div>`;
      } else {
        warningDiv.innerHTML = '';
      }
    }

    function getActivePeople() {
      const people = getPeople();
      return people.filter(p => {
        const cb = document.querySelector(`.person-check[data-id="${p.id}"]`);
        return cb && cb.checked;
      });
    }

    function doGenerate() {
      const startTime = document.getElementById('startTime').value;
      const endTime = document.getElementById('endTime').value;
      const activePeople = getActivePeople();

      const result = generateSchedule(startTime, endTime, activePeople);
      const errorDiv = document.getElementById('generateError');

      if (result.error) {
        errorDiv.innerHTML = `<div class="error">${result.error}</div>`;
        return;
      }

      errorDiv.innerHTML = '';
      localStorage.setItem(STORAGE_LAST_SCHEDULE, JSON.stringify(result));
      window.location.href = 'index.html';
    }

    function addNewPerson() {
      const input = document.getElementById('newPersonInput');
      const name = input.value.trim();
      if (!name) return;
      addPerson(name);
      input.value = '';
      renderPeopleRows();
    }

    function deletePersonHandler(id) {
      if (confirm('Delete this person?')) {
        removePerson(id);
        renderPeopleRows();
      }
    }

    function resetAllDurations() {
      if (confirm('Reset all durations to 20 minutes?')) {
        resetAllDurations();
        renderPeopleRows();
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('presenter').addEventListener('input', (e) => {
      setPresenter(e.target.value);
      updatePresenterWarning();
    });

    document.getElementById('newPersonInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addNewPerson();
    });

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('presenter').value = getPresenter();
      renderPeopleRows();
    });
  </script>
</body>
</html>
