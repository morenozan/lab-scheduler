<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1-1 Meetings</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>1-1 Meetings</h1>
      <nav>
        <a href="settings.html">⚙ Settings</a>
        <a href="../index.html">← All Tools</a>
      </nav>
    </header>

    <div id="content"></div>

    <div class="share-buttons" id="shareButtons" style="display: none;">
      <button class="secondary" onclick="copyAsText()">📋 Copy as Text</button>
      <button class="secondary" onclick="copyShareLink()">🔗 Copy Share Link</button>
    </div>
  </div>

  <script src="../shared.js"></script>
  <script src="app.js"></script>
  <script>
    let currentSchedule = null;

    function displaySchedule() {
      const content = document.getElementById('content');
      const shareButtons = document.getElementById('shareButtons');

      // Prefer URL hash (shareable link), fall back to localStorage
      const fromHash = decodeScheduleFromHash();
      const schedule = fromHash || JSON.parse(localStorage.getItem(STORAGE_LAST_SCHEDULE) || 'null');

      if (!schedule) {
        content.innerHTML = `
          <p style="color: #999; text-align: center; margin-top: 30px;">
            No schedule yet. <a href="settings.html">Generate one</a>.
          </p>`;
        shareButtons.style.display = 'none';
        return;
      }

      currentSchedule = schedule;

      let html = `<div class="schedule-card"><h3>${escapeHtml(schedule.date)}</h3>`;
      let lastBlockIndex = undefined;
      schedule.slots.forEach(slot => {
        if (slot.blockIndex !== undefined && slot.blockIndex !== lastBlockIndex && lastBlockIndex !== undefined) {
          html += `<div class="block-break">— break —</div>`;
        }
        lastBlockIndex = slot.blockIndex;
        html += `<div class="schedule-slot">
          <span class="schedule-time">${escapeHtml(slot.start)}–${escapeHtml(slot.end)}</span>
          <span class="schedule-name">${escapeHtml(slot.name)}</span>
        </div>`;
      });
      html += '</div>';
      content.innerHTML = html;
      shareButtons.style.display = 'flex';
    }

    function copyAsText() {
      if (!currentSchedule) return;
      copyToClipboard(formatScheduleAsText(currentSchedule)).then(ok => {
        if (ok) showFeedback('Copied!');
      });
    }

    function copyShareLink() {
      if (!currentSchedule) return;
      const encoded = encodeSchedule(currentSchedule);
      const base = window.location.href.split('#')[0];
      const url = `${base}#data=${encoded}`;
      copyToClipboard(url).then(ok => {
        if (ok) showFeedback('Share link copied!');
      });
    }

    function showFeedback(msg) {
      const old = document.getElementById('feedback');
      if (old) old.remove();
      const el = document.createElement('div');
      el.id = 'feedback';
      el.className = 'success';
      el.textContent = msg;
      document.querySelector('.share-buttons').after(el);
      setTimeout(() => el.remove(), 2500);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', displaySchedule);
    window.addEventListener('hashchange', displaySchedule);
  </script>
</body>
</html>
