<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Schedule</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: white;
    }
    .container {
      box-shadow: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lab Schedule</h1>
    <div id="content"></div>
  </div>

  <script src="app.js"></script>
  <script>
    function displaySchedule() {
      const schedule = decodeScheduleFromHash();
      const content = document.getElementById('content');

      if (!schedule) {
        content.innerHTML = '<p style="color: #999;">No schedule to display — ask the professor to share a link.</p>';
        return;
      }

      let html = `<div class="schedule-card"><h3>${schedule.date}</h3>`;
      schedule.slots.forEach(slot => {
        html += `<div class="schedule-slot"><span class="schedule-time">${slot.start}–${slot.end}</span><span class="schedule-name">${escapeHtml(slot.name)}</span></div>`;
      });
      html += '</div>';
      content.innerHTML = html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', displaySchedule);
    window.addEventListener('hashchange', displaySchedule);
  </script>
</body>
</html>
