<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Scheduler</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .tool-card {
      background: var(--mantle);
      border: 1px solid var(--surface1);
      border-radius: 8px;
      padding: 20px;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: border-color 0.15s;
    }

    .tool-card:hover {
      border-color: var(--mauve);
    }

    .tool-card h2 {
      margin: 0 0 8px 0;
      font-size: 16px;
      color: var(--mauve);
    }

    .tool-card p {
      margin: 0;
      font-size: 13px;
      color: var(--overlay0);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Lab Scheduler</h1>
    </header>

    <div class="tool-grid">
      <a href="1to1/settings.html" class="tool-card">
        <h2>1-1 Meetings</h2>
        <p>Schedule individual check-ins across a weekly time window.</p>
      </a>
    </div>
  </div>

  <script>
    // Redirect old share links (root index.html#data=...) to the 1-1 display page
    if (window.location.hash.startsWith('#data=')) {
      window.location.replace('1to1/index.html' + window.location.hash);
    }
  </script>
</body>
</html>
